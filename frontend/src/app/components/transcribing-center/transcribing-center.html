<h5 class="card-title">Transcribing Center</h5>
        <form class="d-flex flex-column align-items-center w-100"
              (ngSubmit)="uploadSong()"
              #songForm="ngForm">

          <!-- Hidden file input -->
          <input
            #mp3Input
            type="file"
            accept=".mp3,.wav,audio/mpeg,audio/wav"
            hidden
            (change)="onFileSelected($event)"
          />

          <div class="d-flex align-items-center gap-3 mt-2">
            <button type="button" class="btn btn-neon" (click)="mp3Input.click()">
              Select MP3
            </button>

            <div class="text-truncate">
              Selected file: {{ truncatedFileName }}
            </div>
          </div>

          <div class="mt-4">
            <input
              type="text"
              class="form-control input-neon"
              name="songName"
              placeholder="Enter song name"
              [(ngModel)]="title"
              maxlength="30"
              required
            >
          </div>

          <div class="mt-4">
            <input
              type="text"
              class="form-control input-neon"
              name="artist"
              placeholder="Enter artist name"
              [(ngModel)]="artist"
              maxlength="30"
              required
            >
          </div>

          <button
            type="submit"
            class="btn btn-neon mt-4"
            [disabled]="!songForm.valid || !selectedFile">
            Transcribe
          </button>

        </form>
