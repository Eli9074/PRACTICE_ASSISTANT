<div class="d-flex justify-content-center align-items-center pt-5">

  <div class="card-neon shadow-lg" style="max-width: 420px; width: 100%;">

    <!-- Accent -->
    <div class="card-neon-accent"></div>

    <h4 class="card-title text-center mb-4">Create Account</h4>

    <form (ngSubmit)="submit()">

      <!-- Username -->
      <div class="mb-3">
        <input
          id="username"
          name="username"
          [(ngModel)]="username"
          class="form-control input-neon"
          placeholder="Username"
          required
        />
      </div>

      <!-- Password -->
      <div class="mb-3">
        <input
          id="password"
          name="password"
          type="password"
          [(ngModel)]="password"
          class="form-control input-neon"
          placeholder="Password"
          required
        />
      </div>

      <!-- Email -->
      <div class="mb-4">
        <input
          id="email"
          name="email"
          type="email"
          [(ngModel)]="email"
          class="form-control input-neon"
          placeholder="Email"
          required
        />
      </div>

      <!-- Submit -->
      <button type="submit" class="btn btn-neon w-100">
        Register
      </button>

      <!-- Error -->
      <div *ngIf="error" class="text-danger text-center mt-3">
        {{ error }}
      </div>

    </form>

    <!-- Back to login -->
    <div class="mt-4 text-center">
      <a routerLink="/login" class="text-decoration-none text-info">
        Back to login
      </a>
    </div>

  </div>

</div>
