@if (audioPlayer.isLoading()) {
  <div class="loading-overlay">
    <div class="spinner"></div>
  </div>
}

<div class="flex-grow-1 pt-4">
  <div id="transcription-page" class="container card-neon shadow-lg h-100 d-flex flex-column rounded-4">

    <!-- Left Column -->
    <div class="d-flex flex-50 flex-column">

      <!-- Current Song Title -->
      @if(audioPlayer.currentSong()) {
        <h3 class="text-center pt-3 pb-3 mb-0">
          {{ audioPlayer.currentSong()?.title }} - {{ audioPlayer.currentSong()?.artist }}
        </h3>
      }

      <!-- Main Scrubber -->
      <div class="scrubber-wrapper px-5 py-3">
        <div #playheadScrubber
             class="scrubber"
             (mousedown)="startDrag('playhead', $event)"
             (click)="seekTimeline($event)">

          <div class="scrubber-fill"
               [style.left.%]="0"
               [style.width.%]="playheadPercent">
          </div>

          <div class="scrubber-thumb" [style.left.%]="playheadPercent"></div>
        </div>
      </div>

      <!-- Audio Controls -->
      <div id="audio-controls-container" class="d-flex justify-content-center gap-4 py-3">
        <button class="btn btn-lg btn-neon audio-btn" (click)="audioPlayer.restart()">
          <i class="bi-skip-start-btn"></i>
        </button>

        <button class="btn btn-lg btn-neon audio-btn" (click)="audioPlayer.play()">
          <i class="bi-play-btn"></i>
        </button>

        <button class="btn btn-lg btn-neon audio-btn" (click)="audioPlayer.pause()">
          <i class="bi-pause-btn"></i>
        </button>
      </div>

      <!-- Stems -->
      <div class="card-neon py-3 mx-3 mt-3">
        <div id="stems-container" class="d-flex justify-content-around gap-3">

          <button class="btn btn-neon"
                  [disabled]="!audioPlayer.areStemsReady()"
                  (click)="enableStems()">
            Enable
          </button>

          <button class="btn btn-neon"
                  [disabled]="!audioPlayer.areStemsEnabled()"
                  [ngClass]="{'btn-disabled': audioPlayer.stemPlayers?.['vocals']?.mute}"
                  (click)="toggleVocals()">
            vocals
          </button>

          <button class="btn btn-neon"
                  [disabled]="!audioPlayer.areStemsEnabled()"
                  [ngClass]="{'btn-disabled': audioPlayer.stemPlayers?.['drums']?.mute}"
                  (click)="toggleDrums()">
            drums
          </button>

          <button class="btn btn-neon"
                  [disabled]="!audioPlayer.areStemsEnabled()"
                  [ngClass]="{'btn-disabled': audioPlayer.stemPlayers?.['bass']?.mute}"
                  (click)="toggleBass()">
            bass
          </button>

          <button class="btn btn-neon"
                  [disabled]="!audioPlayer.areStemsEnabled()"
                  [ngClass]="{'btn-disabled': audioPlayer.stemPlayers?.['other']?.mute}"
                  (click)="toggleOther()">
            other
          </button>

        </div>
      </div>

    </div>

    <!-- Right Column -->
    <div class="d-flex flex-50">

      <!-- Looping -->
      <div class="d-flex flex-50 p-3">
        <div class="card-neon flex-grow-1">

          <div class="d-flex align-items-center justify-content-between mb-3">
            <h3 class="mb-0">Looping</h3>

            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" id="loopingEnabled"/>
            </div>
          </div>

          <div class="d-flex flex-column gap-4">

            <div>
              <h5 class="text-center">Start</h5>
              <input type="text" class="input-neon w-100">
            </div>

            <div>
              <h5 class="text-center">Stop</h5>
              <input type="text" class="input-neon w-100">
            </div>

          </div>

        </div>
      </div>

      <!-- Speed -->
      <div class="d-flex flex-50 p-3">
        <div class="card-neon flex-grow-1">

          <h3 class="text-center mb-3">Speed</h3>

          <input
            type="text"
            class="input-neon w-100"
            placeholder="Enter speed (0.25–2)"
            #speedinput
            (keydown.enter)="onStretchEnter(speedinput.value)"
          >

        </div>
      </div>

    </div>

  </div>
</div>
